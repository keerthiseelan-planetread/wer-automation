# Production configuration for Render deployment
[client]
showErrorDetails = false
toolbarMode = "minimal"
showSidebarNavigation = false
maxMessageSize = 200
# Prevent module loading issues during long-running tasks
showStrimLitDeploymentAnalytics = false

[server]
port = 8501
headless = true
runOnSave = false
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
# Increase timeout for long-running report generation
maxRequestSize = 200
# Keep websocket connection alive during processing
websocketCompression = false

[logger]
level = "warning"

[browser]
gatherUsageStats = false
serverAddress = "wer-automation.onrender.com"

[theme]
primaryColor = "#1e40af"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#1f2937"
font = "sans serif"
